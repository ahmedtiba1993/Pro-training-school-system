<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Suivi des documents apprenants</title>
    <style>
        @page {
            size: A4;
            margin: 15mm;
        }

        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            color: #000000;
            line-height: 1.3;
            font-size: 11px;
        }

        .center-header {
            text-align: center;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .header-title {
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 20px;
            border-bottom: 2px solid #000000;
            padding-bottom: 5px;
        }

        .meta-info {
            margin-bottom: 20px;
        }

        .meta-info table {
            width: auto;
        }

        .meta-info td {
            border: none;
            padding: 2px 10px 2px 0;
        }

        /* Style des tableaux */
        table.data-table, table.legend-table {
            border-collapse: collapse;
            border: 1px solid #000000;
        }

        table.data-table th, table.data-table td,
        table.legend-table th, table.legend-table td {
            border: 1px solid #000000;
            padding: 6px 4px;
        }

        table.data-table th, table.legend-table th {
            background-color: #F2F2F2;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
        }

        /* Tableau principal */
        table.data-table {
            width: 100%;
            margin-top: 10px;
        }

        .col-num {
            width: 8%;
            text-align: center;
        }

        .col-fullname {
            width: 62%;
            text-align: left;
        }

        .col-doc {
            text-align: center;
            font-weight: bold;
            font-size: 11px;
        }

        /* SECTION LÉGENDE */
        .legend-container {
            margin-top: 35px;
            page-break-inside: avoid;
        }

        .legend-title {
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        table.legend-table {
            width: 45%; /* Prend moins de place en largeur */
        }

        table.legend-table th {
            text-align: left;
        }

        .col-leg-code {
            width: 25%;
            text-align: center;
            font-weight: bold;
        }

        .col-leg-label {
            width: 75%;
        }

        .empty-msg {
            text-align: center;
            padding: 15px;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="center-header">
    INSTITUT POLY ELÉCTRONIQUE<br/>
    DE FORMATION PROFESSIONNELLE
</div>

<div class="header-title">LISTE DES apprenants &amp; DOCUMENTS</div>

<div class="meta-info">
    <table>
        <tr>
            <td><strong>Classe :</strong></td>
            <td th:text="${className}">Nom de la classe</td>
        </tr>
        <tr>
            <td><strong>Code :</strong></td>
            <td th:text="${classCode}">CODE-123</td>
        </tr>
    </table>
</div>

<table class="data-table">
    <thead>
    <tr>
        <th class="col-num" style="text-align: center;">N°</th>
        <th class="col-fullname">Nom et Prénom</th>
        <th th:each="header : ${headers}" class="col-doc" th:text="${header.shortLabel}">DO</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student, iter : ${students}">
        <td class="col-num" style="text-align: center;" th:text="${iter.count}">1</td>
        <td class="col-fullname" th:text="${student.fullName}">NOM PRENOM</td>
        <td th:each="status : ${student.statuses}" class="col-doc" th:text="${status}">X</td>
    </tr>
    <tr th:if="${#lists.isEmpty(students)}">
        <td th:colspan="${2 + #lists.size(headers)}" class="empty-msg">Aucun apprenant trouvé dans cette classe.</td>
    </tr>
    </tbody>
</table>

<div class="legend-container" th:if="${!#lists.isEmpty(headers)}">
    <div class="legend-title">Légende des codes documents :</div>
    <table class="legend-table">
        <thead>
        <tr>
            <th style="text-align: center;">Code</th>
            <th>Nom du document</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="header : ${headers}">
            <td class="col-leg-code" th:text="${header.shortLabel}">CI</td>
            <td class="col-leg-label" th:text="${header.fullLabel}">Nom complet du document</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
