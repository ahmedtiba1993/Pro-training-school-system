<aside
  class="fixed lg:sticky top-0 left-0 h-screen w-72 bg-white border-r border-slate-100 z-30 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-sm"
>
  <!-- LOGO -->
  <div class="p-6 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200"
      >
        <svg class="w-6 h-6 text-white" stroke-width="1.5">
          <use href="menu-icons.svg#menu-logo"></use>
        </svg>
      </div>
      <span
        class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-indigo-500"
      >
        EduAdmin
      </span>
    </div>
  </div>

  <!-- MENU DE NAVIGATION -->
  <nav class="px-4 py-4 flex-1 space-y-6 overflow-y-auto">
    <!-- ===================================== -->
    <!-- GÉNÉRAL                               -->
    <!-- ===================================== -->
    <div class="space-y-1">
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
        class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
      >
        <svg class="w-5 h-5" stroke-width="1.5">
          <use href="menu-icons.svg#menu-dashboard"></use>
        </svg>
        <span>Tableau de bord</span>
      </a>
    </div>

    <!-- ===================================== -->
    <!-- GESTION ACADÉMIQUE                  -->
    <!-- ===================================== -->
    <div>
      <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">
        Gestion Académique
      </p>
      <div class="space-y-1">
        <a
          routerLink="/admin/academic-years"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
          class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
        >
          <svg class="w-5 h-5" stroke-width="1.5">
            <use href="menu-icons.svg#menu-academic"></use>
          </svg>
          <span>Années Scolaires</span>
        </a>

        <a
          routerLink="/admin/holidays"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
          class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
        >
          <svg class="w-5 h-5" stroke-width="2"><use href="menu-icons.svg#menu-holiday"></use></svg>
          <span>Vacances</span>
        </a>
      </div>
    </div>

    <!-- ===================================== -->
    <!-- OFFRE DE FORMATION                  -->
    <!-- ===================================== -->
    <div>
      <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">
        Offre de Formation
      </p>
      <div class="space-y-1">
        <a
          routerLink="/admin/promotions"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
          class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
        >
          <svg class="w-5 h-5" stroke-width="1.5">
            <use href="menu-icons.svg#menu-promotions"></use>
          </svg>
          <span>Promotions</span>
        </a>

        <!-- Dropdown Spécialités -->
        <div>
          <button
            (click)="isSpecialtiesMenuOpen = !isSpecialtiesMenuOpen"
            [class.bg-indigo-50]="isSpecialtiesMenuOpen"
            [class.text-indigo-700]="isSpecialtiesMenuOpen"
            class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900 focus:outline-none"
          >
            <div class="flex items-center space-x-3">
              <svg class="w-5 h-5" stroke-width="1.5">
                <use href="menu-icons.svg#menu-specialties"></use>
              </svg>
              <span [class.font-medium]="isSpecialtiesMenuOpen">Spécialités</span>
            </div>
            <svg
              [class.rotate-180]="isSpecialtiesMenuOpen"
              class="w-4 h-4 transition-transform duration-200"
              stroke-width="2"
            >
              <use href="menu-icons.svg#menu-chevron-down"></use>
            </svg>
          </button>

          <div *ngIf="isSpecialtiesMenuOpen" class="mt-1 mb-2 space-y-1 pl-11 pr-2">
            <a
              routerLink="/admin/levels"
              routerLinkActive="text-indigo-700 bg-indigo-50/50 font-medium"
              class="flex items-center px-4 py-2 text-sm rounded-lg transition-all text-slate-500 hover:text-slate-900 hover:bg-slate-50 relative"
            >
              <span
                class="absolute left-0 w-1.5 h-1.5 rounded-full bg-slate-300"
                routerLinkActive="bg-indigo-600"
              ></span>
              Niveau de diplôme
            </a>
            <a
              routerLink="/admin/specialties"
              routerLinkActive="text-indigo-700 bg-indigo-50/50 font-medium"
              class="flex items-center px-4 py-2 text-sm rounded-lg transition-all text-slate-500 hover:text-slate-900 hover:bg-slate-50 relative"
            >
              <span
                class="absolute left-0 w-1.5 h-1.5 rounded-full bg-slate-300"
                routerLinkActive="bg-indigo-600"
              ></span>
              Spécialités
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- ===================================== -->
    <!-- ADMISSIONS & INSCRIPTIONS           -->
    <!-- ===================================== -->
    <div>
      <p class="px-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">
        Admissions
      </p>
      <div class="space-y-1">
        <a
          routerLink="/admin/enrollments/new"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
          class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
        >
          <svg class="w-5 h-5" stroke-width="2">
            <use href="menu-icons.svg#menu-user-add"></use>
          </svg>
          <span>Nouvelle Inscription</span>
        </a>

        <a
          routerLink="/admin/enrollments"
          [routerLinkActiveOptions]="{ exact: true }"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
          class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
        >
          <svg class="w-5 h-5" stroke-width="1.5"><use href="menu-icons.svg#menu-users"></use></svg>
          <span>Liste des inscriptions</span>
        </a>

        <a
          routerLink="/admin/registration-documents"
          routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
          class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
        >
          <svg class="w-5 h-5" stroke-width="1.5">
            <use href="menu-icons.svg#menu-folder"></use>
          </svg>
          <span>Pièces à fournir</span>
        </a>
      </div>
    </div>
  </nav>
</aside>
