<aside
  class="fixed lg:sticky top-0 left-0 h-screen w-72 bg-white border-r border-slate-100 z-30 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col shadow-sm"
>
  <div class="p-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-6 h-6 text-white"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 14L3 9l9-5 9 5-9 5z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 9v6l9 5 9-5V9" />
        </svg>
      </div>
      <span
        class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-700 to-indigo-500"
      >
        EduAdmin
      </span>
    </div>
  </div>

  <nav class="px-4 py-2 flex-1 space-y-1 overflow-y-auto">
    <a
      routerLink="/admin/dashboard"
      routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
      class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 13h8V3H3v10zm10 8h8V3h-8v18zM3 21h8v-6H3v6z"
        />
      </svg>
      <span>Tableau de bord</span>
    </a>

    <a
      routerLink="/admin/academic-years"
      routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
      class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
        />
      </svg>
      <span>Années Scolaires</span>
    </a>

    <!-- NOUVEAU MENU : Liste des Inscriptions -->
    <a
      routerLink="/admin/enrollments"
      [routerLinkActiveOptions]="{ exact: true }"
      routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
      class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"
        />
      </svg>
      <span>Liste des inscriptions</span>
    </a>

    <!-- Le bouton de Nouvelle Inscription -->
    <a
      routerLink="/admin/enrollments/new"
      routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
      class="flex items-center space-x-3 px-4 py-3 rounded-xl bg-indigo-50 text-indigo-700 font-medium transition-colors"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="w-5 h-5"
      >
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
        <circle cx="9" cy="7" r="4"></circle>
        <line x1="19" y1="8" x2="19" y2="14"></line>
        <line x1="22" y1="11" x2="16" y2="11"></line>
      </svg>
      <span>Nouvelle Inscription</span>
    </a>

    <a
      routerLink="/admin/registration-documents"
      routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
      class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"
        />
        <path stroke-linecap="round" stroke-linejoin="round" d="m9 13 2 2 4-4" />
      </svg>
      <span>Pièces à fournir</span>
    </a>

    <a
      routerLink="/admin/promotions"
      routerLinkActive="bg-indigo-50 text-indigo-700 font-medium"
      class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-5 h-5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M3 3v1.5M3 21v-6m0 0 2.77-.693a14.45 14.45 0 0 1 4.208-.622 14.45 14.45 0 0 0 4.208.622 14.45 14.45 0 0 1 4.208.622l2.77.693M3 15V4.5l2.77.693a14.45 14.45 0 0 0 4.208.622 14.45 14.45 0 0 1 4.208-.622 14.45 14.45 0 0 0 4.208-.622l2.77-.693V15.75l-2.77-.693a14.45 14.45 0 0 1-4.208-.622 14.45 14.45 0 0 0-4.208.622 14.45 14.45 0 0 1-4.208.622l-2.77.693Z"
        />
      </svg>
      <span>Ouverture Promotions</span>
    </a>
    <div>
      <button
        (click)="isSpecialtiesMenuOpen = !isSpecialtiesMenuOpen"
        [class.bg-indigo-50]="isSpecialtiesMenuOpen"
        [class.text-indigo-700]="isSpecialtiesMenuOpen"
        class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all text-slate-500 hover:bg-slate-50 hover:text-slate-900 focus:outline-none"
      >
        <div class="flex items-center space-x-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="w-5 h-5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M6 6.878V6a2.25 2.25 0 012.25-2.25h7.5A2.25 2.25 0 0118 6v.878m-12 0c.235-.083.487-.128.75-.128h10.5c.263 0 .515.045.75.128m-12 0A2.25 2.25 0 004.5 9v.878m13.5-3A2.25 2.25 0 0119.5 9v.878m0 0a2.246 2.246 0 00-.75-.128H5.25c-.263 0-.515.045-.75.128m15 0A2.25 2.25 0 0121 12v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6c0-.98.626-1.813 1.5-2.122"
            />
          </svg>
          <span [class.font-medium]="isSpecialtiesMenuOpen">Spécialités</span>
        </div>
        <svg
          [class.rotate-180]="isSpecialtiesMenuOpen"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-4 h-4 transition-transform duration-200"
        >
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
        </svg>
      </button>

      <div *ngIf="isSpecialtiesMenuOpen" class="mt-1 mb-2 space-y-1 pl-11 pr-2">
        <a
          routerLink="/admin/levels"
          routerLinkActive="text-indigo-700 bg-indigo-50/50 font-medium"
          class="flex items-center px-4 py-2 text-sm rounded-lg transition-all text-slate-500 hover:text-slate-900 hover:bg-slate-50 relative"
        >
          <span
            class="absolute left-0 w-1.5 h-1.5 rounded-full bg-slate-300"
            routerLinkActive="bg-indigo-600"
          ></span>
          Niveau de diplôme
        </a>

        <a
          routerLink="/admin/specialties"
          routerLinkActive="text-indigo-700 bg-indigo-50/50 font-medium"
          class="flex items-center px-4 py-2 text-sm rounded-lg transition-all text-slate-500 hover:text-slate-900 hover:bg-slate-50 relative"
        >
          <span
            class="absolute left-0 w-1.5 h-1.5 rounded-full bg-slate-300"
            routerLinkActive="bg-indigo-600"
          ></span>
          Spécialité
        </a>
      </div>
    </div>
  </nav>
</aside>
