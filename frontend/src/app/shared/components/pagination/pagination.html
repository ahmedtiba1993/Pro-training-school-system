<div
  class="bg-slate-50 px-6 py-4 border-t border-slate-200 flex flex-col sm:flex-row items-center justify-between gap-4"
>
  <!-- Info Text (Display from X to Y of Z results) -->
  <span class="text-sm text-slate-500 order-2 sm:order-1">
    Affichage de
    <span class="font-bold text-slate-700">{{ startItem }}</span>
    à
    <span class="font-bold text-slate-700">{{ endItem }}</span>
    sur
    <span class="font-bold text-slate-700">{{ total }}</span>
    résultats
  </span>

  <!--Pagination Bar -->
  <nav
    class="isolate inline-flex -space-x-px rounded-md shadow-sm order-1 sm:order-2"
    aria-label="Pagination"
  >
    <!-- Previous Button -->
    <button
      (click)="onNextPrev(currentPage - 1)"
      [disabled]="currentPage === 0 || total === 0"
      class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <span class="sr-only">Précédent</span>
      <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z"
          clip-rule="evenodd"
        />
      </svg>
    </button>

    <!-- LOOP THROUGH PAGE NUMBERS -->
    @for (page of pages; track $index) {
      <!-- Case 1: It is "..." -->
      @if (page === '...') {
        <span
          class="relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300 focus:outline-offset-0"
          >...</span
        >
      }

      <!-- Case 2: It is a page number -->
      @else {
        <button
          (click)="onPageClick(page)"
          class="relative inline-flex items-center px-4 py-2 text-sm font-semibold focus:z-20 focus:outline-offset-0 ring-1 ring-inset ring-gray-300 transition-colors"
          [class.bg-indigo-600]="page === currentPage + 1"
          [class.text-white]="page === currentPage + 1"
          [class.hover:bg-indigo-500]="page === currentPage + 1"
          [class.focus-visible:outline-indigo-600]="page === currentPage + 1"
          [class.text-gray-900]="page !== currentPage + 1"
          [class.hover:bg-gray-50]="page !== currentPage + 1"
        >
          {{ page }}
        </button>
      }
    }

    <!-- Next Button -->
    <button
      (click)="onNextPrev(currentPage + 1)"
      [disabled]="currentPage >= totalPages - 1 || total === 0"
      class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      <span class="sr-only">Suivant</span>
      <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
          clip-rule="evenodd"
        />
      </svg>
    </button>
  </nav>
</div>
