<div class="fixed top-6 right-6 z-50 space-y-3 w-80">
  @for (toast of toasts(); track toast.id) {
    <div
      class="flex items-start justify-between p-4 rounded-xl shadow-lg text-white animate-slide-in"
      [class.bg-green-600]="toast.type === 'success'"
      [class.bg-red-600]="toast.type === 'error'"
      [class.bg-blue-600]="toast.type === 'info'"
      [class.bg-yellow-500]="toast.type === 'warning'"
    >
      <span class="text-sm font-medium">
        {{ toast.message }}
      </span>

      <button (click)="close(toast.id)" class="ml-3 text-white/80 hover:text-white">✕</button>
    </div>
  }
</div>
