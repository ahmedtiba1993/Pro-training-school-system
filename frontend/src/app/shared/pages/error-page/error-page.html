<div
  class="min-h-screen bg-slate-50 flex flex-col items-center justify-center px-4 sm:px-6 lg:px-8"
>
  <div class="max-w-md w-full text-center space-y-8">
    <div class="mx-auto flex items-center justify-center h-24 w-24 rounded-full bg-red-100">
      @if (errorCode() === '403') {
        <svg class="h-12 w-12 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
      } @else {
        <svg
          class="h-12 w-12 text-indigo-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>
      }
    </div>

    <div>
      <h1 class="mt-6 text-9xl font-extrabold text-slate-200 tracking-widest">
        {{ errorCode() }}
      </h1>
      <h2 class="mt-2 text-3xl font-bold text-slate-900 tracking-tight sm:text-4xl">
        {{ errorTitle() }}
      </h2>
      <p class="mt-4 text-base text-slate-500">
        {{ errorMessage() }}
      </p>
    </div>

    <div class="mt-6">
      <a
        routerLink="/auth/login"
        class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-xl shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors"
      >
        Retour à l'accueil
      </a>
    </div>
  </div>
</div>
