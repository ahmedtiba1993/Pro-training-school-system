<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <!-- New Year / Add -->
  <symbol id="icon-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
  </symbol>

  <!-- Active Calendar -->
  <symbol id="icon-calendar-alt" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
  </symbol>

  <!-- Edit -->
  <symbol id="icon-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
  </symbol>

  <!-- Edit Alt (Smaller Edit Icon) -->
  <symbol id="icon-edit-alt" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path>
  </symbol>

  <!-- View Details (Eye) -->
  <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
  </symbol>

  <!-- Chevron Right -->
  <symbol id="icon-chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
  </symbol>

  <!-- Chevron Left -->
  <symbol id="icon-chevron-left" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
  </symbol>

  <!-- Close (Cross) -->
  <symbol id="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
  </symbol>

  <!-- Refresh / Status -->
  <symbol id="icon-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
  </symbol>

  <!-- Empty Calendar -->
  <symbol id="icon-calendar-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
  </symbol>

  <!-- Calendar -->
  <symbol id="icon-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <rect x="3" y="4" width="18" height="18" rx="2"></rect>
    <line x1="16" y1="2" x2="16" y2="6"></line>
    <line x1="8" y1="2" x2="8" y2="6"></line>
    <line x1="3" y1="10" x2="21" y2="10"></line>
  </symbol>

  <!-- Layers -->
  <symbol id="icon-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <polygon stroke-linejoin="round" points="12 2 2 7 12 12 22 7 12 2" />
    <polyline stroke-linejoin="round" points="2 17 12 22 22 17" />
    <polyline stroke-linejoin="round" points="2 12 12 17 22 12" />
  </symbol>

  <!-- Plus Circle -->
  <symbol id="icon-plus-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <circle cx="12" cy="12" r="10"></circle>
    <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h8"></path>
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v8"></path>
  </symbol>

  <!-- Loading Spinner -->
  <symbol id="icon-spinner" viewBox="0 0 24 24" fill="none">
    <circle opacity="0.25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
    <path opacity="0.75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
  </symbol>

  <!-- Soleil (Statistiques) -->
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <circle cx="12" cy="12" r="4"></circle>
    <path d="M12 2v2"></path>
    <path d="M12 20v2"></path>
    <path d="M5 5l1.5 1.5"></path>
    <path d="M17.5 17.5L19 19"></path>
    <path d="M2 12h2"></path>
    <path d="M20 12h2"></path>
    <path d="M5 19l1.5-1.5"></path>
    <path d="M17.5 6.5L19 5"></path>
  </symbol>

  <!-- Horloge simple (Prochain repos) -->
  <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <circle cx="12" cy="12" r="10"></circle>
    <polyline points="12 6 12 12 16 14"></polyline>
  </symbol>

  <!-- Horloge alternative (Durée en jours) -->
  <symbol id="icon-clock-alt" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
  </symbol>

  <!-- Settings (Depuis le code HTML) -->
  <symbol id="icon-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7h-9" />
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 17H5" />
    <circle cx="17" cy="17" r="3" stroke-width="2" />
    <circle cx="7" cy="7" r="3" stroke-width="2" />
  </symbol>

  <!-- Save (Depuis le code HTML) -->
  <symbol id="icon-save" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
    <polyline stroke-linecap="round" stroke-linejoin="round" stroke-width="2" points="17 21 17 13 7 13 7 21" />
    <polyline stroke-linecap="round" stroke-linejoin="round" stroke-width="2" points="7 3 7 8 15 8" />
  </symbol>

  <!-- Book Open (Livre ouvert) -->
  <symbol id="icon-book-open" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
  </symbol>

  <!-- Award / Homologuée -->
  <symbol id="icon-award" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <circle cx="12" cy="8" r="6"></circle>
    <path stroke-linecap="round" stroke-linejoin="round" d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"></path>
  </symbol>

  <!-- History / Continue -->
  <symbol id="icon-history" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M3 3v5h5" />
  </symbol>

  <!-- Zap / Accélérée -->
  <symbol id="icon-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <polygon stroke-linecap="round" stroke-linejoin="round" points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
  </symbol>

  <!-- Power / Activer-Désactiver -->
  <symbol id="icon-power" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M18.36 6.64a9 9 0 1 1-12.73 0" />
    <line stroke-linecap="round" stroke-linejoin="round" x1="12" y1="2" x2="12" y2="12" />
  </symbol>

  <!-- Edit File (Table Action) -->
  <symbol id="icon-edit-file" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
  </symbol>

  <!-- Edit Pencil (Modal Header) -->
  <symbol id="icon-edit-pencil" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 20h9" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
  </symbol>

  <!-- Graduation Cap / Diplôme -->
  <symbol id="icon-graduation-cap" viewBox="0 0 24 24" fill="none" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M22 10v6M2 10l10-5 10 5-10 5z" />
    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12v5c3 3 9 3 12 0v-5" />
  </symbol>
</svg>